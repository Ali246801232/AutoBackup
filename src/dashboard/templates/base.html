<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}AutoBackup{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="icon" href="{{ url_for('static', filename='img/logo.png') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,400;0,500;0,700;1,400&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    {% block head %}{% endblock %}
</head>
<body>
    <header class="app-header">
        <div class="header-left">
            <a href="/" class="logo-link">
                <img class="logo" src="{{ url_for('static', filename='img/logo.png') }}" alt="AutoBackup">
                <span class="app-title">AutoBackup</span>
            </a>
        </div>
        <div class="header-right">
            <span class="configs-dir-hint" id="configs-dir-hint" title="{{ configs_dir }}">{{ configs_dir }}</span>
            <button id="hamburger-btn" title="Menu"><i data-lucide="menu"></i></button>
            <div class="dropdown-menu" id="dropdown-menu" hidden>
                <button class="dropdown-item" id="theme-toggle"><i data-lucide="moon"></i> Toggle Theme</button>
                <button class="dropdown-item" id="startup-btn"><i data-lucide="power"></i> Startup Settings</button>
            </div>
        </div>
    </header>

    <main class="container">
        {% block content %}{% endblock %}
    </main>

    <div id="toast-container" class="toast-container"></div>
    <div id="modal-container" class="modal-overlay" hidden></div>

    <script src="{{ url_for('static', filename='js/theme.js') }}"></script>
    <script src="{{ url_for('static', filename='js/header.js') }}"></script>

    {% block scripts %}{% endblock %}
</body>
</html>
